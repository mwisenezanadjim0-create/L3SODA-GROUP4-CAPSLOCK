<html>
<head>
    <title>Table Example</title>
</head>
<body>
    <table border="1" width="400" height="200">
    <tr>
        <td colspan="2" style="text-align: center;">Top</td>
    </tr>
    <tr>
      <td style="text-align: center;">Left</td>
      <td style="text-align: center;">Right</td>
    </tr>
    <tr>
      <td colspan="2" style="text-align: center;">Bottom</td>
    </tr>
  </table>
  <br><br>
  <table border="2" width="400" height="200">
    <tr>
        <td colspan="3" style="text-align: center;">Top</td>
    </tr>
    <tr>
        <td  style="text-align: center;">Left</td>
        <td style="text-align: center;">Middle</td>
        <td  style="text-align: center;">Right</td>
    </tr>
    <tr>
        <td colspan="3" style="text-align: center;">Bottom</td>
    </tr>
  </table>
    </body>
</html>
